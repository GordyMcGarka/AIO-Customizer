[@Icons]

[*Stock]
;mode=option
;mini=true
ini_file_source /bootloader/hekate_ipl.ini
filter config
set-footer {ini_file_source(*)}
set-ini-val ./config.ini *Stock command set-ini-val
refresh-return
back

