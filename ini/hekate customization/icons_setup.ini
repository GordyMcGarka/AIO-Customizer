[Reset Configs]

[Reset Configs]
remove-ini-section ./config.ini *Stock
remove-ini-section ./config.ini *EmuMMC
remove-ini-section ./config.ini *SysMMC
remove-ini-section ./config.ini *Android
remove-ini-section ./config.ini *Ubuntu
remove-ini-section ./config.ini *Linux
remove-ini-section ./config.ini *Lakka
remove-ini-section ./config.ini '*Lockpick RCM'
refresh-to *Stock